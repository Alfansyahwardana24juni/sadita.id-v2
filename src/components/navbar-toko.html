<header

    id="toko-navbar">
    <div class="flex items-center gap-2">
        <a href="javascript:history.back()"
            class="w-9 h-9 rounded-xl bg-surface-container flex items-center justify-center hover:bg-surface-container-high transition-colors active:scale-90"

            <span class="material-symbols-outlined text-primary text-[20px]">arrow_back</span>

        <div class="flex items-center gap-1.5">

            <span class="material-symbols-outlined text-primary text-[20px]">shopping_cart</span>
            <span
