<a href="detailartikel.html"
    class="flex gap-4 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all duration-300 group">
    <div class="w-24 h-24 shrink-0 overflow-hidden rounded-xl">
        <img class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
            src="{{ image }}" alt="{{ title }}" />
    </div>
    <div class="flex-1 flex flex-col justify-center">
        <h3 class="font-headline-md text-sm mb-1 group-hover:text-primary transition-colors line-clamp-1">{{ title }}
        </h3>
        <p class="font-body-md text-xs text-gray-500 line-clamp-2">{{ summary }}</p>
        <div class="flex items-center justify-between mt-2">
            <span
                class="text-[10px] text-primary font-bold uppercase tracking-wider bg-primary/10 w-fit px-2 py-0.5 rounded-full">{{
                category }}</span>
            <span class="text-[10px] text-gray-400">{{ date }}</span>
        </div>
    </div>
</a>
