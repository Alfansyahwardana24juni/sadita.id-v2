                        "surface-dim": "#dcd9d9",
                        "primary-fixed": "#ffdad4",
                        "tertiary-fixed-dim": "#c6c6c7",

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tap-highlight-transparent {
            -webkit-tap-highlight-color: transparent;
        }

<body class="bg-surface font-body-md text-on-surface">
    <div class="max-w-[512px] mx-auto min-h-screen bg-white relative pb-32">
        <!-- TopNavBar -->
        <header
            class="bg-white dark:bg-gray-900 font-['Inter'] antialiased max-w-[512px] mx-auto w-full sticky top-0 border-b border-gray-200 dark:border-gray-800 shadow-sm shadow-black/5 z-50">
            <div class="flex justify-between items-center h-16 px-5 w-full">
                <button onclick="window.location.href='katalog.html'"
                    class="text-red-900 dark:text-red-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
                </button>
                <span class="text-lg font-bold tracking-widest text-red-900 dark:text-red-500">SADITA</span>
                <button onclick="window.location.href='checkout.html'"
                    class="text-red-900 dark:text-red-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors active:scale-95 duration-150 p-2 rounded-full">
                    <span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
                </button>
            </div>
        </header>
        <!-- Product Hero Image -->
        <div class="w-full aspect-square bg-surface-container overflow-hidden">
            <img class="w-full h-full object-cover"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuB7EncpSRaa-IbiPHSiO49mByKK-2o0C6ZT6D1hDn28uQehsv9k57Cn6oH10EoyAnoBCs6nJJercIuszb1b_-L5ko7Gl2XjI59QUxUMClElmKL-IwEVDFt99svUPhtLxspFdPSSH-zfodi9OLMIt2YbruuDCqVcA8bA3U78AV9sCHGye2hTwoeekAE6CBYV-1MIrxbx20oAR6ZTU7umOin8RUBzJhgFFN1xMp8R1U8St2xGFD2cx5_wn2dGFrMjqAQ5-O02D_EkZEpW" />
        </div>
        <!-- Product Details Header -->
        <section class="px-margin-main pt-stack-md">
            <div class="flex flex-wrap gap-2 mb-2">
                <span
                    class="bg-primary-container text-on-primary font-label-lg text-label-lg px-2 py-0.5 rounded-full uppercase tracking-wider">Antibiotik</span>
                <span
                    class="bg-surface-container-high text-on-surface-variant font-label-lg text-label-lg px-2 py-0.5 rounded-full">Hewan
                    Ternak</span>
            </div>
            <h1 class="font-display-sm text-display-sm text-on-surface mb-1">Cyprotil</h1>
            <div class="flex items-center gap-3 mb-4">
                <div class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-amber-500 text-[18px]"
                        style="font-variation-settings: 'FILL' 1;">star</span>
                    <span class="font-label-lg text-label-lg text-on-surface">4.9</span>
                </div>
                <span class="w-[1px] h-3 bg-outline-variant"></span>
                <span class="font-label-lg text-label-lg text-secondary">Terjual 2rb+</span>
            </div>
            <div class="mb-stack-lg">
                <p class="font-display-sm text-display-sm text-primary">Rp 145.000</p>
            </div>
        </section>
        <!-- Fixed Bottom Action Bar -->
        <div
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[512px] bg-white border-t border-gray-200 px-5 py-4 z-50 flex gap-3 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
            <button onclick="showToast()"
                class="flex-1 border border-primary text-primary font-headline-md text-[14px] py-3 rounded-lg flex items-center justify-center gap-2 tap-highlight-transparent active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-[20px]">add_shopping_cart</span>
                Tambah
            </button>
            <button onclick="window.location.href='checkout.html'"
                class="flex-[2] bg-primary-container text-on-primary font-headline-md text-[14px] py-3 rounded-lg flex items-center justify-center gap-2 tap-highlight-transparent active:scale-95 transition-transform shadow-lg shadow-primary-container/20">
                Beli Sekarang
            </button>
        </div>
    </div>
    <div class="fixed top-20 left-1/2 -translate-x-1/2 z-[60] bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl opacity-0 translate-y-4 pointer-events-none transition-all duration-300 flex items-center gap-2"
        id="success-toast">
        <span class="material-symbols-outlined text-green-400 text-lg">check_circle</span>
        Berhasil ditambahkan ke keranjang
    </div>
    <script>
        function showToast() {
            const toast = document.getElementById('success-toast');
            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 2000);
        }
    </script>
</body>

</html>
